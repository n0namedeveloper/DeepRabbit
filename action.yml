name: 'DeepRabbit Code Review'
description: 'AI-powered autonomous code review using DeepSeek LLM'
author: 'DeepRabbit Team'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  api_url:
    description: 'DeepRabbit FastAPI server URL'
    required: false
    default: 'https://api.deeprabbit.dev/review'
  api_key:
    description: 'API key used to authenticate with the server'
    required: true
  deepseek_api_key:
    description: 'DeepSeek API key'
    required: true
  github_token:
    description: 'GitHub token used to comment on PRs'
    required: true
  review_level:
    description: 'Review level (light/normal/strict)'
    required: false
    default: 'normal'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        pip install requests httpx

    - name: Collect PR Data
      shell: bash
      id: collect
      run: |
        echo "pr_number=${{ github.event.number }}" >> $GITHUB_OUTPUT
        echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
        echo "head_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
        echo "base_sha=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT

    - name: Send to DeepRabbit API
      shell: python
      env:
        API_URL: ${{ inputs.api_url }}
        API_KEY: ${{ inputs.api_key }}
        DEEPSEEK_KEY: ${{ inputs.deepseek_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ github.event.number }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        REVIEW_LEVEL: ${{ inputs.review_level }}
      run: |
        import os, sys, json, subprocess, requests
        
        def get_diff():
            result = subprocess.run(
                ['git', 'diff', os.environ['BASE_SHA'], os.environ['HEAD_SHA']],
                capture_output=True, text=True
            )
            return result.stdout

        def get_files():
            result = subprocess.run(
                ['git', 'diff', '--name-status', os.environ['BASE_SHA'], os.environ['HEAD_SHA']],
                capture_output=True, text=True
            )
            files = []
            for line in result.stdout.strip().split('\n'):
                if line:
                    parts = line.split('\t')
                    status = parts[0]
                    filename = parts[1]
                    files.append({'status': status, 'filename': filename})
            return files

        def get_file_content(filename):
            try:
                result = subprocess.run(
                    ['git', 'show', f"{os.environ['HEAD_SHA']}:{filename}"],
                    capture_output=True, text=True
                )
                return result.stdout if result.returncode == 0 else None
            except:
                return None

        diff = get_diff()
        files = get_files()
        file_contents = {}
        for f in files:
            content = get_file_content(f['filename'])
            if content:
                file_contents[f['filename']] = content

        payload = {
            'repository': os.environ['REPO'],
            'pr_number': int(os.environ['PR_NUMBER']),
            'head_sha': os.environ['HEAD_SHA'],
            'base_sha': os.environ['BASE_SHA'],
            'diff': diff,
            'files': files,
            'file_contents': file_contents,
            'deepseek_api_key': os.environ['DEEPSEEK_KEY'],
            'github_token': os.environ['GITHUB_TOKEN'],
            'review_level': os.environ['REVIEW_LEVEL']
        }

        headers = {
            'Content-Type': 'application/json',
            'X-API-Key': os.environ['API_KEY']
        }

        try:
            response = requests.post(
                os.environ['API_URL'],
                json=payload,
                headers=headers,
                timeout=300
            )
            response.raise_for_status()
            result = response.json()
            
            print(f"✅ Review completed!")
            print(f"Summary: {result.get('summary', 'N/A')}")
            print(f"Issues found: {result.get('issues_count', 0)}")
            print(f"Comments posted: {result.get('comments_posted', 0)}")
            
            if result.get('issues_count', 0) > 0:
                print("\n📝 Issues found:")
                for issue in result.get('issues', [])[:10]:
                    severity = issue.get('severity', 'unknown')
                    icon = '🔴' if severity == 'high' else '🟡' if severity == 'medium' else '🟢'
                    print(f"  {icon} [{severity.upper()}] {issue.get('title', '')}")
                    print(f"     File: {issue.get('file', 'unknown')}, Line: {issue.get('line', 'N/A')}")
                    
        except requests.exceptions.HTTPError as e:
            print(f"❌ HTTP Error: {e}")
            print(f"Response: {e.response.text}")
            sys.exit(1)
        except Exception as e:
            print(f"❌ Error: {e}")
            sys.exit(1)
